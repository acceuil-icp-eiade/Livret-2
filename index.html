<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accueil IADE - ICP</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1e3a8a">
<link rel="apple-touch-icon" href="logo.png">

</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="logo.png">
  <h1>Accueil Étudiants IADE</h1>
  <p>Institut Cœur Poumon</p>
</div>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <h1>Bienvenue au bloc opératoire</h1>
    <p>Votre parcours IADE commence ici</p>

    <div class="buttons">
      <button class="btn btn-light" onclick="openLogin()">Accès guide étudiant</button>
      <a class="btn btn-dark" href="#">Accès contenu complet</a>
    </div>
  </div>
</section>

<!-- LOGIN -->
<div id="loginModal" class="modal">
  <div class="box">
    <h2>Accès étudiant</h2>
    <input id="password" type="password" placeholder="Mot de passe">
    <button onclick="checkPassword()">Continuer</button>
    <button onclick="closeLogin()">Annuler</button>
    <p id="error"></p>
  </div>
</div>

<!-- DISCLAIMER -->
<div id="disclaimer" class="overlayModal">
  <div class="box">
    <h2>Avertissement</h2>
    <p>Site pédagogique IADE.</p>

    <button onclick="acceptDisclaimer()">Continuer</button>
  </div>
</div>

<!-- CONTENU -->
<div id="content" class="hidden">

  <div class="card">
    <h2>👋 Bienvenue</h2>
    <p>Contenu pédagogique IADE.</p>
  </div>

  <!-- 🔎 CONTACTS (SAFE SEARCH) -->
  <div class="card">
    <h2>☎️ Contacts</h2>

    <input id="searchContacts" placeholder="Rechercher un contact...">

    <div id="contactList">
      <div class="contact">Dr Martin</div>
      <div class="contact">Dr Dupont</div>
      <div class="contact">IADE Sophie</div>
      <div class="contact">Cadre Bloc</div>
    </div>
  </div>

</div>

<!-- MENU -->
<div class="bottom-menu">
  <div class="menu-item active">📄</div>
  <div class="menu-item">🗺️</div>
  <div class="menu-item">🎥</div>
  <div class="menu-item">📝</div>
  <div class="menu-item">☎️</div>
</div>

<script src="script.js"></script>
</body>
</html>
